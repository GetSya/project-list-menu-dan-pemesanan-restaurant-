<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Warisan Rasa | Pesan & Konfirmasi WA Otomatis</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fef7e9 0%, #faeedb 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #2c2418;
            scroll-behavior: smooth;
        }

        /* custom scroll */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f2e3d2;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c97e3a;
            border-radius: 10px;
        }

        /* header mewah */
        .luxury-header {
            background: rgba(20, 14, 8, 0.85);
            backdrop-filter: blur(14px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 200, 130, 0.5);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .nav-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .brand-lux {
            display: flex;
            align-items: baseline;
            gap: 14px;
            flex-wrap: wrap;
        }
        .brand-lux h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFE6C7, #FFB366);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .brand-lux span {
            background: #b45f2b;
            padding: 4px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff3e6;
        }
        .cart-icon-lux {
            background: rgba(255, 245, 230, 0.15);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.5rem;
            border-radius: 80px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid rgba(255, 190, 100, 0.6);
            font-weight: 600;
            color: #fff1e2;
        }
        .cart-icon-lux i {
            font-size: 1.3rem;
            color: #f7b05e;
        }
        .cart-icon-lux:hover {
            background: rgba(200, 110, 40, 0.5);
            transform: scale(1.02);
        }
        #cart-count-badge {
            background: #e67e22;
            border-radius: 40px;
            padding: 2px 12px;
            font-weight: bold;
            color: #2e1f12;
        }

        /* main container */
        .main-layout {
            max-width: 1400px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }
        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .menu-col {
            flex: 2.2;
            min-width: 280px;
        }
        .cart-col {
            flex: 1.2;
            min-width: 300px;
        }

        /* title style */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
            color: #4e2f1a;
        }
        .section-title:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 70px;
            height: 3px;
            background: #e67e22;
            border-radius: 4px;
        }

        /* menu cards premium */
        .menu-grid-lux {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.6rem;
            margin-bottom: 2rem;
        }
        .menu-card-lux {
            background: rgba(255, 252, 245, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 36px;
            padding: 1.3rem;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            border: 1px solid rgba(230, 126, 34, 0.2);
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.08);
        }
        .menu-card-lux:hover {
            transform: translateY(-6px);
            background: #ffffff;
            border-color: #e67e22;
            box-shadow: 0 25px 35px -14px rgba(160, 80, 20, 0.2);
        }
        .menu-header-lux {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.8rem;
        }
        .menu-name-lux {
            font-weight: 800;
            font-size: 1.2rem;
            font-family: 'Playfair Display', serif;
            color: #3a2a1c;
        }
        .menu-price-lux {
            background: #f7e5d4;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 700;
            color: #bf621f;
            font-size: 0.85rem;
        }
        .qty-zone {
            display: flex;
            align-items: center;
            gap: 18px;
            background: #fbf3ea;
            padding: 6px 15px;
            border-radius: 60px;
            width: fit-content;
            margin: 0.8rem 0;
        }
        .qty-btn-lux {
            background: #e4d2be;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .qty-btn-lux:hover {
            background: #d4b48a;
            color: white;
        }
        .qty-number {
            font-weight: 700;
            min-width: 30px;
            text-align: center;
            font-size: 1.1rem;
        }
        .btn-add-cart {
            width: 100%;
            background: #e67e22;
            border: none;
            padding: 10px 0;
            border-radius: 50px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 5px;
        }
        .btn-add-cart:hover {
            background: #c55a1a;
            gap: 14px;
        }

        /* form pemesanan elegan */
        .form-glass {
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 2rem;
            margin-top: 2rem;
            border: 1px solid rgba(230,126,34,0.3);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        .input-group {
            margin-bottom: 1.3rem;
        }
        .input-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #7a582e;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 12px 18px;
            background: #fffdf9;
            border: 1px solid #eedbc4;
            border-radius: 34px;
            font-family: inherit;
            transition: 0.2s;
        }
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
        }
        .radio-payment {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 12px 0 8px;
        }
        .radio-payment label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
        }
        .btn-order-lux {
            background: #2c6e2f;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-order-lux:disabled {
            background: #a0a07e;
            cursor: not-allowed;
        }
        /* keranjang premium */
        .cart-premium {
            background: rgba(255, 248, 240, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 42px;
            padding: 1.6rem;
            position: sticky;
            top: 95px;
            border: 1px solid rgba(230,126,34,0.4);
            box-shadow: 0 25px 40px -14px rgba(0,0,0,0.15);
        }
        .cart-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            border-bottom: 2px dashed #e6c99e;
            padding-bottom: 12px;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
        }
        .cart-items-scroll {
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f3e3d1;
        }
        .cart-item-name {
            font-weight: 700;
        }
        .cart-qty-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .cart-qty-btn {
            background: #e9d9c6;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-remove {
            background: none;
            border: none;
            color: #b46f3a;
            cursor: pointer;
        }
        .total-amount {
            font-weight: 800;
            font-size: 1.4rem;
            text-align: right;
            margin: 16px 0;
            padding-top: 10px;
            border-top: 2px solid #e6c99e;
        }
        .clear-cart {
            background: #b35f26;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2c6e2f;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            z-index: 999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(40px);}
            to { opacity: 1; transform: translateX(0);}
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #b68657;
            font-size: 0.8rem;
        }
        @media (max-width: 850px) {
            .cart-premium {
                position: static;
            }
        }
    </style>
</head>
<body>

<header class="luxury-header">
    <div class="nav-wrap">
        <div class="brand-lux">
            <h1><i class="fas fa-fire"></i> Warisan Rasa</h1>
            <span>Nusantara Authentic</span>
        </div>
        <div class="cart-icon-lux" id="cart-scroll-btn">
            <i class="fas fa-bag-shopping"></i>
            <span>Keranjang</span>
            <span id="cart-count-badge">0</span>
        </div>
    </div>
</header>

<div class="main-layout">
    <div class="two-columns">
        <!-- Kolom kiri: menu + form -->
        <div class="menu-col">
            <div class="section-title">🍛 Menu Spesial</div>
            <div class="menu-grid-lux" id="menuGrid"></div>

            <div class="form-glass">
                <h3 style="font-family: Playfair Display; margin-bottom: 1.4rem;"><i class="fas fa-address-card"></i> Detail Pemesan</h3>
                <form id="orderForm">
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Nama Lengkap *</label>
                        <input type="text" id="customerName" placeholder="Ibu / Bapak ..." required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-location-dot"></i> Alamat Lengkap *</label>
                        <textarea id="customerAddress" rows="2" placeholder="Jl. Raya, No. Rumah, Kecamatan..." required></textarea>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-phone"></i> No. WhatsApp (untuk konfirmasi) *</label>
                        <input type="tel" id="customerPhone" placeholder="6281234567890" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-pen"></i> Catatan (opsional)</label>
                        <textarea id="notes" rows="2" placeholder="Misal: level pedas, pisang goreng crispy..."></textarea>
                    </div>
                    <div class="input-group">
                        <label>💸 Metode Pembayaran *</label>
                        <div class="radio-payment" id="paymentRadios">
                            <label><input type="radio" name="paymentMethod" value="Transfer Bank (BCA/Mandiri)" required> 🏦 Transfer Bank</label>
                            <label><input type="radio" name="paymentMethod" value="QRIS (OVO/Dana/GoPay)"> 📱 QRIS / e-Wallet</label>
                            <label><input type="radio" name="paymentMethod" value="Kartu Kredit/Debit"> 💳 Kartu Kredit</label>
                            <label><input type="radio" name="paymentMethod" value="COD (Bayar di Tempat)"> 🚚 COD</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-order-lux" id="orderSubmitBtn"><i class="fas fa-check-circle"></i> Pesan & Kirim ke Admin WA</button>
                </form>
            </div>
        </div>

        <!-- Kolom kanan: keranjang -->
        <div class="cart-col">
            <div class="cart-premium">
                <div class="cart-title">
                    <span><i class="fas fa-basket-shopping"></i> Pesanan Saya</span>
                    <i class="fas fa-mug-hot" style="color:#e67e22;"></i>
                </div>
                <div id="cartItemsContainer" class="cart-items-scroll">
                    <div style="text-align:center; padding: 2rem; color:#b48c62;">🍃 Keranjang kosong</div>
                </div>
                <div id="cartTotalDisplay" class="total-amount">Total: Rp 0</div>
                <button id="clearCartBtn" class="clear-cart"><i class="fas fa-trash-alt"></i> Kosongkan Keranjang</button>
            </div>
        </div>
    </div>
</div>
<footer>
    <i class="fas fa-leaf"></i> Setiap pesanan akan dikonfirmasi ke admin via WhatsApp & kamu akan mendapat notifikasi
</footer>

<script>
    // -------------------- MENU --------------------
    const MENU = [
        { id: "ayam_bakar", name: "Ayam Bakar", price: 28000 },
        { id: "nasi_goreng", name: "Nasi Goreng Spesial", price: 32000 },
        { id: "mie_goreng", name: "Mie Goreng Jawa", price: 26000 },
        { id: "kentang", name: "Kentang Goreng", price: 18000 },
        { id: "roti_bakar", name: "Roti Bakar", price: 15000 },
        { id: "pisang", name: "Pisang Goreng", price: 14000 },
        { id: "esteh", name: "Es Teh Manis", price: 8000 },
        { id: "jus_alpukat", name: "Jus Alpukat", price: 18000 },
        { id: "esjeruk", name: "Es Teh Jeruk", price: 10000 }
    ];

    let cart = [];
    // ---------- FONNTE TOKEN ----------
    const FONNTE_TOKEN = "3AbaYM6hFKLv8dTxRy62";
    // GANTI DENGAN NOMOR WHATSAPP ADMIN YANG SESUNGGUHNYA (contoh: 6281234567890)
    const ADMIN_PHONE = "6288214772441";   // <-- GANTI DENGAN NOMOR ADMIN

    // Helper
    function formatRupiah(val) {
        return "Rp " + val.toLocaleString("id-ID");
    }

    function saveCart() {
        localStorage.setItem("warisan_cart", JSON.stringify(cart));
    }

    function loadCart() {
        const stored = localStorage.getItem("warisan_cart");
        if(stored) {
            try {
                cart = JSON.parse(stored);
                if(!Array.isArray(cart)) cart = [];
            } catch(e) { cart = []; }
        } else cart = [];
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById("cartItemsContainer");
        const totalSpan = document.getElementById("cartTotalDisplay");
        const badge = document.getElementById("cart-count-badge");
        if(!container) return;

        if(cart.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem; color:#b48c62;">✨ Belum ada item ✨</div>';
            totalSpan.innerText = `Total: ${formatRupiah(0)}`;
            badge.innerText = "0";
            return;
        }
        let totalQty = 0, totalPrice = 0;
        let html = "";
        cart.forEach(item => {
            totalQty += item.quantity;
            totalPrice += item.price * item.quantity;
            html += `
                <div class="cart-item-row" data-id="${item.id}">
                    <div>
                        <div class="cart-item-name">${item.name}</div>
                        <small>${formatRupiah(item.price)}</small>
                    </div>
                    <div class="cart-qty-actions">
                        <button class="cart-qty-btn cart-minus" data-id="${item.id}">−</button>
                        <span style="min-width:28px; text-align:center;">${item.quantity}</span>
                        <button class="cart-qty-btn cart-plus" data-id="${item.id}">+</button>
                        <button class="cart-remove" data-id="${item.id}"><i class="fas fa-trash-can"></i></button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalSpan.innerText = `Total: ${formatRupiah(totalPrice)}`;
        badge.innerText = totalQty;

        // attach events keranjang
        document.querySelectorAll(".cart-minus").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = btn.getAttribute("data-id");
                updateQty(id, -1);
            });
        });
        document.querySelectorAll(".cart-plus").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = btn.getAttribute("data-id");
                updateQty(id, 1);
            });
        });
        document.querySelectorAll(".cart-remove").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = btn.getAttribute("data-id");
                removeItem(id);
            });
        });
    }

    function updateQty(id, delta) {
        const idx = cart.findIndex(i => i.id === id);
        if(idx !== -1) {
            let newQty = cart[idx].quantity + delta;
            if(newQty <= 0) cart.splice(idx, 1);
            else cart[idx].quantity = newQty;
            saveCart();
            renderCart();
        }
    }
    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        renderCart();
    }

    function addToCart(menuItem, qty) {
        if(qty <= 0) return;
        const exist = cart.find(i => i.id === menuItem.id);
        if(exist) exist.quantity += qty;
        else cart.push({ ...menuItem, quantity: qty });
        saveCart();
        renderCart();
        showToast(`+${qty} ${menuItem.name} ditambahkan`);
    }

    function showToast(msg) {
        const toast = document.createElement("div");
        toast.className = "toast-message";
        toast.innerHTML = `<i class="fas fa-heart"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // render menu grid
    function renderMenuGrid() {
        const grid = document.getElementById("menuGrid");
        if(!grid) return;
        grid.innerHTML = "";
        MENU.forEach(item => {
            const card = document.createElement("div");
            card.className = "menu-card-lux";
            card.innerHTML = `
                <div class="menu-header-lux">
                    <span class="menu-name-lux">${item.name}</span>
                    <span class="menu-price-lux">${formatRupiah(item.price)}</span>
                </div>
                <div class="qty-zone">
                    <button class="qty-btn-lux dec-${item.id}">−</button>
                    <span class="qty-number" id="qty-${item.id}">1</span>
                    <button class="qty-btn-lux inc-${item.id}">+</button>
                </div>
                <button class="btn-add-cart add-${item.id}" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">
                    <i class="fas fa-cart-shopping"></i> Tambah
                </button>
            `;
            grid.appendChild(card);
        });

        // event quantity per menu
        MENU.forEach(item => {
            const decBtn = document.querySelector(`.dec-${item.id}`);
            const incBtn = document.querySelector(`.inc-${item.id}`);
            const qtySpan = document.getElementById(`qty-${item.id}`);
            if(decBtn) decBtn.onclick = () => {
                let val = parseInt(qtySpan.innerText);
                if(val > 1) qtySpan.innerText = val - 1;
            };
            if(incBtn) incBtn.onclick = () => {
                let val = parseInt(qtySpan.innerText);
                qtySpan.innerText = val + 1;
            };
            const addBtn = document.querySelector(`.add-${item.id}`);
            addBtn.onclick = () => {
                let qty = parseInt(qtySpan.innerText);
                const menuObj = { id: item.id, name: item.name, price: item.price };
                addToCart(menuObj, qty);
                qtySpan.innerText = "1";
            };
        });
    }

    // Kirim notifikasi WA via Fonnte ke admin
    async function sendWaNotification(orderData) {
        const { customerName, customerPhone, address, paymentMethod, notes, items, total } = orderData;

        let itemsText = "";
        items.forEach(it => {
            itemsText += `• ${it.name} x${it.quantity} = ${formatRupiah(it.price * it.quantity)}\n`;
        });
        const message = `🍽️ *PESANAN BARU - WARISAN RASA* 🍽️\n\n👤 *Nama:* ${customerName}\n📞 *Telepon:* ${customerPhone}\n📍 *Alamat:* ${address}\n💳 *Bayar:* ${paymentMethod}\n📝 *Catatan:* ${notes || "Tidak ada"}\n\n*Pesanan:*\n${itemsText}\n💰 *Total:* ${formatRupiah(total)}\n\nTerima kasih, segera proses pesanan.`;

        const payload = new URLSearchParams();
        payload.append("target", ADMIN_PHONE);
        payload.append("message", message);

        try {
            const response = await fetch("https://api.fonnte.com/send", {
                method: "POST",
                headers: {
                    "Authorization": FONNTE_TOKEN,
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: payload
            });
            const result = await response.json();
            if(result.status) {
                showToast("✅ Notifikasi WA ke admin berhasil dikirim");
                return true;
            } else {
                console.error("Fonnte error:", result);
                showToast("⚠️ Gagal kirim WA ke admin, cek token / nomor");
                return false;
            }
        } catch (err) {
            console.error(err);
            showToast("❌ Error jaringan saat kirim notifikasi");
            return false;
        }
    }

    // Submit pesanan utama
    const orderForm = document.getElementById("orderForm");
    const submitBtn = document.getElementById("orderSubmitBtn");

    orderForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const customerName = document.getElementById("customerName").value.trim();
        const customerAddress = document.getElementById("customerAddress").value.trim();
        const customerPhone = document.getElementById("customerPhone").value.trim();
        const notes = document.getElementById("notes").value.trim();
        const paymentRadio = document.querySelector('input[name="paymentMethod"]:checked');
        const paymentMethod = paymentRadio ? paymentRadio.value : null;

        if(!customerName) { alert("Nama lengkap wajib diisi"); return; }
        if(!customerAddress) { alert("Alamat wajib diisi"); return; }
        if(!customerPhone) { alert("Nomor WhatsApp wajib diisi"); return; }
        if(!paymentMethod) { alert("Pilih metode pembayaran"); return; }
        if(cart.length === 0) { alert("Keranjang masih kosong, tambahkan menu dulu!"); return; }

        // hitung total
        let totalOrder = 0;
        cart.forEach(item => { totalOrder += item.price * item.quantity; });

        const orderData = {
            customerName,
            customerPhone,
            address: customerAddress,
            paymentMethod,
            notes,
            items: cart.map(i => ({ name: i.name, quantity: i.quantity, price: i.price })),
            total: totalOrder
        };

        // disable tombol sebentar
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengirim notifikasi...';

        const waSuccess = await sendWaNotification(orderData);

        if(waSuccess) {
            alert(`✅ Pesanan berhasil!\n\nTotal: ${formatRupiah(totalOrder)}\nAdmin akan segera memproses pesanan Anda.\nTerima kasih ${customerName}`);
            // reset keranjang setelah sukses
            cart = [];
            saveCart();
            renderCart();
            // reset form opsional (biarkan nama dll terisi, tapi bisa reset manual)
            document.getElementById("notes").value = "";
            // radio tetap
        } else {
            alert("Pesanan tersimpan di sistem, tetapi gagal mengirim WA ke admin. Silakan hubungi restoran langsung.");
        }

        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Pesan & Kirim ke Admin WA';
    });

    document.getElementById("clearCartBtn").addEventListener("click", () => {
        if(cart.length && confirm("Kosongkan semua pesanan?")) {
            cart = [];
            saveCart();
            renderCart();
            showToast("Keranjang dikosongkan");
        } else if(cart.length === 0) alert("Keranjang kosong");
    });
    document.getElementById("cart-scroll-btn").addEventListener("click", () => {
        document.querySelector(".cart-col").scrollIntoView({ behavior: "smooth" });
    });

    renderMenuGrid();
    loadCart();
</script>
</body>
</html>
