<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Warisan Rasa | Taste of Nusantara</title>
    <!-- Fonts premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font awesome 6 (free CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #fdf8f0 0%, #f9efdf 100%);
            font-family: 'Inter', sans-serif;
            color: #2c241a;
            scroll-behavior: smooth;
        }

        /* custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f0e2d0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c87e3a;
            border-radius: 10px;
        }

        /* header mewah */
        .hero-header {
            background: rgba(30, 20, 12, 0.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-bottom: 1px solid rgba(255,215,150,0.4);
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .brand {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        .brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFE6C7, #FFB77C);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .brand span {
            font-size: 0.8rem;
            background: #a7582c;
            padding: 4px 12px;
            border-radius: 40px;
            color: #fff2e4;
            font-weight: 500;
        }
        .cart-preview {
            background: rgba(255,245,235,0.2);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid rgba(255,200,130,0.5);
            font-weight: 600;
            color: #fbead5;
        }
        .cart-preview i {
            font-size: 1.3rem;
            color: #ffb347;
        }
        .cart-preview:hover {
            background: rgba(200, 120, 50, 0.4);
            transform: scale(1.02);
            border-color: #ffb86b;
        }
        #cart-count-badge {
            background: #e67e22;
            border-radius: 40px;
            padding: 2px 10px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #2c1a0c;
        }

        /* container utama */
        .main-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* layout dua kolom modern */
        .resto-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }

        /* bagian kiri: menu + form */
        .menu-panel {
            flex: 2.2;
            min-width: 280px;
        }
        .cart-panel {
            flex: 1.2;
            min-width: 300px;
        }

        /* kartu menu premium */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
            color: #4e3622;
        }
        .section-title:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60px;
            height: 3px;
            background: #e67e22;
            border-radius: 4px;
        }

        .menu-grid-premium {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.6rem;
            margin-bottom: 2.5rem;
        }

        .menu-card {
            background: rgba(255, 252, 245, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 1.2rem;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(230, 126, 34, 0.2);
            box-shadow: 0 12px 22px -12px rgba(0,0,0,0.1);
        }
        .menu-card:hover {
            transform: translateY(-5px);
            background: white;
            border-color: #e67e22;
            box-shadow: 0 20px 30px -12px rgba(160, 80, 20, 0.2);
        }
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .menu-name {
            font-weight: 700;
            font-size: 1.2rem;
            font-family: 'Playfair Display', serif;
            color: #2d3e2b;
        }
        .menu-price {
            font-weight: 700;
            color: #c55a1a;
            background: #fff0e0;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .qty-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 1rem 0 0.8rem;
            background: #f9f0e6;
            padding: 6px 12px;
            border-radius: 60px;
            width: fit-content;
        }
        .qty-btn {
            background: #e6d5c0;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.15s;
            color: #5a3e28;
        }
        .qty-btn:hover {
            background: #d4b68a;
            color: white;
        }
        .qty-num {
            font-weight: 700;
            min-width: 28px;
            text-align: center;
            font-size: 1rem;
        }
        .add-to-cart {
            width: 100%;
            background: #e67e22;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 6px;
            font-size: 0.9rem;
        }
        .add-to-cart:hover {
            background: #c55a1a;
            gap: 14px;
        }

        /* form pesanan premium */
        .order-card {
            background: rgba(255, 250, 240, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 1.8rem;
            margin-top: 1rem;
            border: 1px solid #f3e1ca;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #6b4c2c;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: #fffcf8;
            border: 1px solid #eedbc4;
            border-radius: 28px;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
        }
        .payment-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 12px 0 8px;
        }
        .payment-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
        }
        .btn-order {
            background: #2c6e2f;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .btn-order:hover {
            background: #1f5622;
            transform: scale(0.98);
        }

        /* keranjang elegan */
        .cart-glass {
            background: rgba(255, 248, 240, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 1.5rem;
            position: sticky;
            top: 95px;
            border: 1px solid rgba(230,126,34,0.3);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
        }
        .cart-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            border-bottom: 2px dashed #e6cba2;
            padding-bottom: 10px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
        .cart-items-scroll {
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0e0ce;
        }
        .cart-item-detail {
            flex: 2;
        }
        .cart-item-title {
            font-weight: 700;
        }
        .cart-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .cart-qty-btn {
            background: #e9d9c6;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-remove-btn {
            background: none;
            border: none;
            color: #b46f3a;
            cursor: pointer;
            font-size: 1.1rem;
            margin-left: 6px;
        }
        .total-row {
            font-weight: 800;
            font-size: 1.3rem;
            text-align: right;
            margin: 15px 0;
            padding-top: 10px;
            border-top: 2px solid #e6cba2;
        }
        .clear-cart-btn {
            background: #bc6f2e;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .clear-cart-btn:hover {
            background: #9b551f;
        }

        /* toast notifikasi */
        .toast-notif {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2c6e2f;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            z-index: 999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #af8e6b;
            margin-top: 2rem;
            font-size: 0.8rem;
        }
        @media (max-width: 850px) {
            .nav-container {
                flex-direction: column;
                text-align: center;
            }
            .cart-panel {
                position: static;
            }
        }
    </style>
</head>
<body>

<header class="hero-header">
    <div class="nav-container">
        <div class="brand">
            <h1><i class="fas fa-utensils"></i> Warisan Rasa</h1>
            <span>Taste of Nusantara</span>
        </div>
        <div class="cart-preview" id="cart-icon-click">
            <i class="fas fa-shopping-bag"></i>
            <span>Keranjang</span>
            <span id="cart-count-badge">0</span>
        </div>
    </div>
</header>

<div class="main-container">
    <div class="resto-layout">
        <!-- panel kiri: menu + form -->
        <div class="menu-panel">
            <div class="section-title">🍽️ Menu Spesial</div>
            <div class="menu-grid-premium" id="menu-grid"></div>

            <div class="order-card">
                <h3 style="font-family: 'Playfair Display'; margin-bottom: 1rem;"><i class="fas fa-pen-alt"></i> Detail Pemesan</h3>
                <form id="order-form">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nama Lengkap *</label>
                        <input type="text" id="nama" placeholder="Contoh: Sari Wulandari" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Alamat Pengiriman *</label>
                        <textarea id="alamat" rows="2" placeholder="Jl. Merdeka No. 88, Jakarta" required></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone-alt"></i> No. Telepon *</label>
                        <input type="tel" id="telepon" placeholder="0812-3456-7890" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-comment-dots"></i> Catatan (opsional)</label>
                        <textarea id="catatan" rows="2" placeholder="Tingkat kepedasan, request khusus..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>💳 Metode Pembayaran *</label>
                        <div class="payment-group" id="payment-group">
                            <label><input type="radio" name="payment" value="Transfer Bank (BCA/Mandiri)" required> 🏦 Transfer Bank</label>
                            <label><input type="radio" name="payment" value="QRIS (OVO/Dana/GoPay)"> 📱 QRIS / e-Wallet</label>
                            <label><input type="radio" name="payment" value="Kartu Kredit/Debit"> 💳 Kartu Kredit</label>
                            <label><input type="radio" name="payment" value="Bayar di Tempat (COD)"> 🚚 COD</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-order"><i class="fas fa-check-circle"></i> Pesan Sekarang</button>
                </form>
            </div>
        </div>

        <!-- panel kanan: keranjang mewah -->
        <div class="cart-panel">
            <div class="cart-glass">
                <div class="cart-header">
                    <span><i class="fas fa-shopping-cart"></i> Keranjang Saya</span>
                    <i class="fas fa-leaf" style="color:#e67e22;"></i>
                </div>
                <div id="cart-items-list" class="cart-items-scroll">
                    <div style="text-align:center; padding: 2rem; color:#b48c62;">✨ Belum ada pesanan ✨</div>
                </div>
                <div id="cart-total" class="total-row">Total: Rp 0</div>
                <button id="clear-cart-btn" class="clear-cart-btn"><i class="fas fa-trash-alt"></i> Kosongkan Keranjang</button>
            </div>
        </div>
    </div>
</div>
<footer>
    <i class="fas fa-mandolin"></i> Warisan Rasa Nusantara • Rasa otentik & kenangan hangat
</footer>

<script>
    // ===================== DATA MENU =====================
    const MENU_ITEMS = [
        { id: "ayam_bakar", name: "Ayam Bakar", price: 28000 },
        { id: "nasi_goreng_spesial", name: "Nasi Goreng Spesial", price: 32000 },
        { id: "mie_goreng_jawa", name: "Mie Goreng Jawa", price: 26000 },
        { id: "kentang_goreng", name: "Kentang Goreng", price: 18000 },
        { id: "roti_bakar", name: "Roti Bakar", price: 15000 },
        { id: "pisang_goreng", name: "Pisang Goreng", price: 14000 },
        { id: "es_teh_manis", name: "Es Teh Manis", price: 8000 },
        { id: "jus_alpukat", name: "Jus Alpukat", price: 18000 },
        { id: "es_teh_jeruk", name: "Es Teh Jeruk", price: 10000 }
    ];

    let cart = [];

    // Helper
    function formatRupiah(angka) {
        return 'Rp ' + angka.toLocaleString('id-ID');
    }

    function saveCart() {
        localStorage.setItem('warisanRasaCart', JSON.stringify(cart));
    }

    function loadCart() {
        const stored = localStorage.getItem('warisanRasaCart');
        if(stored) {
            try {
                cart = JSON.parse(stored);
                if(!Array.isArray(cart)) cart = [];
            } catch(e) { cart = []; }
        } else { cart = []; }
        renderCart();
    }

    // render keranjang dan update badge
    function renderCart() {
        const container = document.getElementById('cart-items-list');
        const totalSpan = document.getElementById('cart-total');
        const badge = document.getElementById('cart-count-badge');
        if(!container) return;

        if(cart.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding: 2rem; color:#b48c62;">🍃 Keranjang masih kosong</div>';
            totalSpan.innerText = `Total: ${formatRupiah(0)}`;
            badge.innerText = '0';
            return;
        }

        let totalItems = 0;
        let totalPrice = 0;
        let html = '';
        cart.forEach(item => {
            totalItems += item.quantity;
            totalPrice += item.price * item.quantity;
            html += `
                <div class="cart-item-row" data-id="${item.id}">
                    <div class="cart-item-detail">
                        <div class="cart-item-title">${item.name}</div>
                        <small>${formatRupiah(item.price)}</small>
                    </div>
                    <div class="cart-controls">
                        <button class="cart-qty-btn cart-minus" data-id="${item.id}">−</button>
                        <span style="min-width: 28px; text-align:center;">${item.quantity}</span>
                        <button class="cart-qty-btn cart-plus" data-id="${item.id}">+</button>
                        <button class="cart-remove-btn" data-id="${item.id}"><i class="fas fa-trash-can"></i></button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalSpan.innerText = `Total: ${formatRupiah(totalPrice)}`;
        badge.innerText = totalItems;

        // event listeners keranjang
        document.querySelectorAll('.cart-minus').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                updateQuantity(id, -1);
            });
        });
        document.querySelectorAll('.cart-plus').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                updateQuantity(id, 1);
            });
        });
        document.querySelectorAll('.cart-remove-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                removeItemCompletely(id);
            });
        });
    }

    function updateQuantity(id, delta) {
        const idx = cart.findIndex(i => i.id === id);
        if(idx !== -1) {
            let newQty = cart[idx].quantity + delta;
            if(newQty <= 0) {
                cart.splice(idx,1);
            } else {
                cart[idx].quantity = newQty;
            }
            saveCart();
            renderCart();
        }
    }
    function removeItemCompletely(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        renderCart();
    }

    function addToCart(menuItem, qty) {
        if(qty <= 0) return;
        const exist = cart.find(i => i.id === menuItem.id);
        if(exist) {
            exist.quantity += qty;
        } else {
            cart.push({ ...menuItem, quantity: qty });
        }
        saveCart();
        renderCart();
        showToast(`✅ ${menuItem.name} +${qty} ditambahkan`);
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast-notif';
        toast.innerHTML = `<i class="fas fa-spa"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1800);
    }

    // Render menu grid dengan kontrol dinamis
    function renderMenuGrid() {
        const grid = document.getElementById('menu-grid');
        if(!grid) return;
        grid.innerHTML = '';
        MENU_ITEMS.forEach(item => {
            const card = document.createElement('div');
            card.className = 'menu-card';
            card.innerHTML = `
                <div class="menu-header">
                    <span class="menu-name">${item.name}</span>
                    <span class="menu-price">${formatRupiah(item.price)}</span>
                </div>
                <div class="qty-selector">
                    <button class="qty-btn dec-btn" data-id="${item.id}">−</button>
                    <span class="qty-num" id="qty-${item.id}">1</span>
                    <button class="qty-btn inc-btn" data-id="${item.id}">+</button>
                </div>
                <button class="add-to-cart" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">
                    <i class="fas fa-cart-plus"></i> Tambah ke Keranjang
                </button>
            `;
            grid.appendChild(card);
        });

        // event untuk increment/decrement tiap menu
        document.querySelectorAll('.dec-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const span = document.getElementById(`qty-${id}`);
                let val = parseInt(span.innerText);
                if(val > 1) span.innerText = val - 1;
            });
        });
        document.querySelectorAll('.inc-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const span = document.getElementById(`qty-${id}`);
                let val = parseInt(span.innerText);
                span.innerText = val + 1;
            });
        });
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name');
                const price = parseInt(btn.getAttribute('data-price'));
                const qtySpan = document.getElementById(`qty-${id}`);
                let qty = parseInt(qtySpan.innerText);
                if(isNaN(qty) || qty < 1) qty = 1;
                const menuObj = { id, name, price };
                addToCart(menuObj, qty);
                qtySpan.innerText = '1';  // reset ke 1 setelah tambah
            });
        });
    }

    // Submit form pesanan
    function handleOrder(e) {
        e.preventDefault();
        const nama = document.getElementById('nama').value.trim();
        const alamat = document.getElementById('alamat').value.trim();
        const telepon = document.getElementById('telepon').value.trim();
        const paymentRadio = document.querySelector('input[name="payment"]:checked');
        const paymentMethod = paymentRadio ? paymentRadio.value : null;
        const catatan = document.getElementById('catatan').value.trim() || '-';

        if(!nama) { alert('Nama lengkap wajib diisi'); return; }
        if(!alamat) { alert('Alamat pengiriman wajib diisi'); return; }
        if(!telepon) { alert('Nomor telepon wajib diisi'); return; }
        if(!paymentMethod) { alert('Pilih metode pembayaran'); return; }
        if(cart.length === 0) { alert('Keranjang masih kosong, pilih menu dulu ya!'); return; }

        let detailPesanan = '';
        let totalOrder = 0;
        cart.forEach(item => {
            totalOrder += item.price * item.quantity;
            detailPesanan += `${item.name} x${item.quantity} = ${formatRupiah(item.price * item.quantity)}\n`;
        });

        const konfirmasi = `🍽️ WARISAN RASA 🍽️\n\nNama: ${nama}\nAlamat: ${alamat}\nTelp: ${telepon}\nPembayaran: ${paymentMethod}\nCatatan: ${catatan}\n\nPesanan:\n${detailPesanan}\nTotal: ${formatRupiah(totalOrder)}\n\nTerima kasih! Pesanan akan segera diproses.`;
        alert(konfirmasi);
        if(confirm('✅ Pesanan diterima! Kosongkan keranjang untuk pesanan baru?')) {
            cart = [];
            saveCart();
            renderCart();
        }
    }

    // clear cart button
    document.getElementById('clear-cart-btn')?.addEventListener('click', () => {
        if(cart.length > 0 && confirm('Hapus semua item di keranjang?')) {
            cart = [];
            saveCart();
            renderCart();
            showToast('Keranjang dikosongkan');
        } else if(cart.length === 0) alert('Keranjang sudah kosong');
    });

    // scroll ke keranjang saat klik ikon
    document.getElementById('cart-icon-click')?.addEventListener('click', () => {
        document.querySelector('.cart-panel')?.scrollIntoView({ behavior: 'smooth' });
    });

    // init semua
    function init() {
        renderMenuGrid();
        loadCart();
        const form = document.getElementById('order-form');
        if(form) form.addEventListener('submit', handleOrder);
    }
    init();
</script>
</body>
</html>
